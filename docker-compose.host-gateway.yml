# ============================================================
# MemoMCP Docker Compose — 宿主机绕行模式（兼容方案）
#
# 注意：这不是 Docker 的 network_mode: host，仍是 bridge 网络。
# memory-server / memomcp-mcp 通过 host.docker.internal 经宿主机 5432 端口转发到 postgres。
#
# 本方案同时启动：
#   - postgres      数据库
#   - memory-server REST/Web 管理与 API（8000）
#   - memomcp-mcp   MCP HTTP 服务（9000）
#
# 适用：Colima / 部分 Mac Docker 环境下容器名互联异常时的兜底方案。
# 常规部署请使用默认的 docker-compose.yml（容器间直连）。
#
# 启动: docker compose -f docker-compose.host-gateway.yml up -d
#
# 数据持久化（命名卷）:
#   pgdata  → PostgreSQL 数据目录
#   docker compose down        仅删除容器，数据卷保留
#   docker compose down -v     删除容器并清除所有命名卷（数据库彻底清空）
# ============================================================
services:
  init-db:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-init-db
    user: "0:0"
    volumes:
      - db-init:/init-scripts
    command: >
      sh -c "cp /app/init.sql /init-scripts/init.sql
      && chmod 644 /init-scripts/init.sql
      && echo 'init.sql copied to shared volume'"
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: memomcp-postgres
    environment:
      POSTGRES_USER: memomcp
      POSTGRES_PASSWORD: memomcp
      POSTGRES_DB: memomcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - db-init:/docker-entrypoint-initdb.d:ro
    depends_on:
      init-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memomcp -d memomcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - memomcp-net

  memory-server:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memomcp:memomcp@host.docker.internal:5432/memomcp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - memomcp-net

  memomcp-mcp:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-mcp
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memomcp:memomcp@host.docker.internal:5432/memomcp
    command: python -m app.main --mcp --transport http --port 9000
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - memomcp-net

volumes:
  pgdata:
    name: memomcp_pgdata
    driver: local
  db-init:
    name: memomcp_db_init
    driver: local

networks:
  memomcp-net:
    driver: bridge
