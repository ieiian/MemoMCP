# ============================================================
# MemoMCP Docker Compose
# 启动: docker compose up -d
# ============================================================
services:
  # ------------------------------------------------------------
  # init 容器：从 memory-server 镜像中提取 init.sql 到共享卷
  # 避免 ./init/init.sql 不存在时被 Docker 创建为目录
  # ------------------------------------------------------------
  init-db:
    image: ieiian/memomcp-server:latest
    container_name: memomcp-init-db
    volumes:
      - db-init:/init-scripts
    command: >
      sh -c "cp /app/init.sql /init-scripts/init.sql && echo 'init.sql copied to shared volume'"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: memomcp-postgres
    environment:
      POSTGRES_USER: memomcp
      POSTGRES_PASSWORD: memomcp
      POSTGRES_DB: memomcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - db-init:/docker-entrypoint-initdb.d:ro
    depends_on:
      init-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memomcp -d memomcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - memomcp-net

  memory-server:
    image: ieiian/memomcp-server:latest
    container_name: memomcp-server
    env_file:
      - .env
    environment:
      # 通过宿主机端口连接 PostgreSQL（绕过 Docker 内部网络隔离）
      DATABASE_URL: postgresql+asyncpg://memomcp:memomcp@host.docker.internal:5432/memomcp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - memomcp-net

volumes:
  pgdata:
    driver: local
  db-init:
    driver: local

networks:
  memomcp-net:
    driver: bridge