# ============================================================
# MemoMCP Docker Compose — Bridge 容器直连（默认）
# 启动: docker compose up -d
#
# 使用远程镜像（默认）:
#   docker compose pull && docker compose up -d
#
# 本地构建后模拟远程镜像:
#   cd memory-server && docker build -t ieiian/memomcp-server:latest -f Dockerfile .
#   cd .. && docker compose up -d
#
# 本方案同时启动：
#   - postgres      数据库
#   - memory-server REST/Web 管理与 API（8000）
#   - memomcp-mcp   MCP HTTP 服务（9000）
#
# 自定义镜像: 在 .env 中设置 MEMOMCP_IMAGE=your-registry/memomcp-server:tag
# ============================================================
services:
  init-db:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-init-db
    user: "0:0"
    volumes:
      - db-init:/init-scripts
    command: >
      sh -c "cp /app/init.sql /init-scripts/init.sql
      && chmod 644 /init-scripts/init.sql
      && echo 'init.sql copied to shared volume'"
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: memomcp-postgres
    environment:
      POSTGRES_USER: memomcp
      POSTGRES_PASSWORD: memomcp
      POSTGRES_DB: memomcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - db-init:/docker-entrypoint-initdb.d:ro
    depends_on:
      init-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memomcp -d memomcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - memomcp-net

  memory-server:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memomcp:memomcp@postgres:5432/memomcp
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - memomcp-net

  memomcp-mcp:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-mcp
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memomcp:memomcp@postgres:5432/memomcp
    command: python -m app.main --mcp --transport http --port 9000
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - memomcp-net

volumes:
  pgdata:
    driver: local
  db-init:
    driver: local

networks:
  memomcp-net:
    driver: bridge
