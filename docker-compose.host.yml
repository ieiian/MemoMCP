# ============================================================
# MemoMCP Docker Compose — Host Network（真正 Host 模式）
#
# network_mode: host — 容器与宿主机共享网络栈，无端口映射、无 bridge
# DATABASE_URL 使用 127.0.0.1，postgres / memory-server / memomcp-mcp 通过宿主机回环地址通信
#
# 本方案同时启动：
#   - postgres      数据库
#   - memory-server REST/Web 管理与 API（8000）
#   - memomcp-mcp   MCP HTTP 服务（9000）
#
# 适用：Linux 服务器（Mac/Windows Docker Desktop 对 host 网络支持有限，请用默认 bridge）
#
# 启动: docker compose -f docker-compose.host.yml up -d
#
# 前置：宿主机 5432、8000、9000 端口未被占用
# 自定义镜像: 在 .env 中设置 MEMOMCP_IMAGE=your-registry/memomcp-server:tag
#
# 数据持久化（命名卷）:
#   pgdata  → PostgreSQL 数据目录
#   docker compose down        仅删除容器，数据卷保留
#   docker compose down -v     删除容器并清除所有命名卷（数据库彻底清空）
# ============================================================
services:
  init-db:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-init-db
    user: "0:0"
    volumes:
      - db-init:/init-scripts
    command: >
      sh -c "cp /app/init.sql /init-scripts/init.sql
      && chmod 644 /init-scripts/init.sql
      && echo 'init.sql copied to shared volume'"
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: memomcp-postgres
    network_mode: host
    environment:
      POSTGRES_USER: memomcp
      POSTGRES_PASSWORD: memomcp
      POSTGRES_DB: memomcp
    volumes:
      - pgdata:/var/lib/postgresql/data
      - db-init:/docker-entrypoint-initdb.d:ro
      # 也可改用宿主机目录（需先复制 init.sql 到 ./init/）:
      # - ./init/:/docker-entrypoint-initdb.d/:ro
    depends_on:
      init-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memomcp -d memomcp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  memory-server:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-server
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memomcp:memomcp@127.0.0.1:5432/memomcp
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  memomcp-mcp:
    image: ${MEMOMCP_IMAGE:-ieiian/memomcp-server:latest}
    container_name: memomcp-mcp
    network_mode: host
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memomcp:memomcp@127.0.0.1:5432/memomcp
    command: python -m app.main --mcp --transport http --port 9000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    name: memomcp_pgdata
    driver: local
  db-init:
    name: memomcp_db_init
    driver: local
